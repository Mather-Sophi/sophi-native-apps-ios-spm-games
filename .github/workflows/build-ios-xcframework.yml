name: Build - Paywall iOS XCFramework
on:
  workflow_dispatch:

  pull_request:
    types: [closed]
    branches: [main]
    paths:
      - 'paywall/library/**'
      - '!paywall/library/README.md'
      - '!paywall/library/tools'


defaults:
  run:
    working-directory: paywall
jobs:
  build:
    if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Log file structure
        run: |
          echo "Listing all files in the repository:"
          # Use the 'find' command starting from the current directory (.)
          pwd
          # find . -type f

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '22'
          cache: gradle

      # - name: Setup Gradle
      #   uses: gradle/actions/setup-gradle@v5
      #   with:
      #     gradle-version: '8.14.2'

      - name: Generate XCFramework
        run: ./gradlew podPublishXCFramework

      # - name: Zip XCFramework
      #   run: zip -r Paywall.xcframework.zip ./library/build/cocoapods/publish/release/Paywall.xcframework

      - name: Upload XCFramework as artifact
        uses: actions/upload-artifact@v6
        with:
          name: paywall-ios-xcframework
          path: ./library/build/cocoapods/publish/release/Paywall.xcframework