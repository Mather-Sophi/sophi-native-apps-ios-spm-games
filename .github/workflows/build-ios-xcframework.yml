name: Build - Paywall iOS XCFramework
on:
  workflow_dispatch:

  pull_request:
    types: [closed]
    branches: [main]
    paths:
      - 'paywall/library/**'
      - '!paywall/library/README.md'
      - '!paywall/library/tools'


defaults:
  run:
    working-directory: paywall
jobs:
  build:
    if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '22'
          cache: gradle

      # - name: Setup Gradle
      #   uses: gradle/actions/setup-gradle@v5
      #   with:
      #     gradle-version: '8.14.2'

      - name: Generate XCFramework
        run: ./gradlew podPublishXCFramework

      - name: Zip XCFramework
        run: |
          cd library/build/cocoapods/publish/release && zip -r ${GITHUB_WORKSPACE}/Paywall.xcframework.zip ./Paywall.xcframework

      # - name: Zip Source Code
      #   run: |
      #     cd library/src/commonTest && zip -r ${GITHUB_WORKSPACE}/Paywall.xcframework.zip kotlin

      - name: Upload XCFramework as artifact
        uses: actions/upload-artifact@v6
        with:
          name: paywall-ios-xcframework
          path: Paywall.xcframework.zip
          if-no-files-found: warn

      # - name: Upload Source Code as artifact
      #   uses: actions/upload-artifact@v6
      #   with:
      #     name: paywall-ios-source-code
      #     path: paywall/library/src/commonTest/
      #     if-no-files-found: error
