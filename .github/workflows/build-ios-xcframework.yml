name: Build - Paywall iOS XCFramework
on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

  pull_request:
    types: [closed]
    branches: [main]
    paths:
      - 'paywall/library/**'
      - '!paywall/library/README.md'
      - '!paywall/library/tools'


defaults:
  run:
    working-directory: paywall
jobs:
  validate:
    # runs-on: ubuntu-latest
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate release tag format
        run: |
          if [[ ! "${{ github.event.inputs.release_tag }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: Release tag '${{ github.event.inputs.release_tag }}' must be in the format vX.Y.Z (e.g., v1.0.0)"
            exit 1
          fi
          echo "Release tag format is valid: ${{ github.event.inputs.release_tag }}"

      - name: Check if release tag already exists
        run: |
          set +e
          gh release view ${{ github.event.inputs.release_tag }} > /dev/null 2>&1
          EXIT_CODE=$?
          set -e
          if [[ $EXIT_CODE -eq 0 ]]; then
            echo "Error: Release tag ${{ github.event.inputs.release_tag }} already exists."
            exit 1
          else
            echo "Release tag ${{ github.event.inputs.release_tag }} does not exist. Proceeding..."
          fi
        # env:
        #   GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '22'

      # - name: Setup Gradle
      #   uses: gradle/gradle-build-action@v2

      # - name: Generate XCFramework
      #   run: ./gradlew podPublishXCFramework

      - name: Upload XCFramework as artifact
        uses: actions/upload-artifact@v6
        with:
          name: paywall-ios-xcframework
          path: paywall/library/build/cocoapods/publish/release/Paywall.xcframework
          if-no-files-found: error


  package:
    needs: build
    runs-on: ubuntu-latest
    steps:
      
      - uses: actions/checkout@v6
        # TODO: Checkout Target Repository that contains Package.swift

      - id: artifact-download
        name: Download xcframework artifact
        uses: actions/download-artifact@v6
        with:
          name: paywall-ios-xcframework
          path: /tmp/artifacts/Paywall.xcframework
      
      - name: Zip XCFramework
        run: |
          ls -R ${{ steps.artifact-download.outputs.download-path }}
          ls -R ${{ steps.artifact-download.outputs.download-path }}/Paywall.xcframework
          zip -r Paywall.xcframework.zip ${{ steps.artifact-download.outputs.download-path }}/Paywall.xcframework
      # - name: Zip XCFramework
      #   run: |
      #     cd library/build/cocoapods/publish/release && zip -r ${GITHUB_WORKSPACE}/Paywall.xcframework.zip ./file.xcframework

      # - uses: swift-actions/setup-swift@v3
      - name: Compute XCFramework checksum
        id: xc-framework-checksum
        # run: echo "checksum=ASDFGHJKL" >> $GITHUB_OUTPUT
        run: checksum=$(swift package compute-checksum ${GITHUB_WORKSPACE}/Paywall.xcframework.zip); echo "checksum=$checksum" >> $GITHUB_OUTPUT

      - name: Print checksum
        run: |
          echo "XCFramework Checksum: ${{ steps.xc-framework-checksum.outputs.checksum }}"

      - name: Update Swift binary targets 
        run: |
          sed -i 's/\${RELEASE_TAG}/${{ github.event.inputs.release_tag }}/g' library/Package.swift
          sed -i 's/\${CHECKSUM}/${{ steps.xc-framework-checksum.outputs.checksum }}/g' library/Package.swift
          cat library/Package.swift
          
