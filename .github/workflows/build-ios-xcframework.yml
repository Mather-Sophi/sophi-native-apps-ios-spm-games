name: Build - Paywall iOS XCFramework
on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

  pull_request:
    types: [closed]
    branches: [main]
    paths:
      - 'paywall/library/**'
      - '!paywall/library/README.md'
      - '!paywall/library/tools'


defaults:
  run:
    working-directory: paywall
env:
  ARTIFACTS_DIR: /tmp/artifacts
jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Validate release tag format
        run: |
          if [[ ! "${{ github.event.inputs.release_tag }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: Release tag '${{ github.event.inputs.release_tag }}' must be in the format vX.Y.Z (e.g., v1.0.0)"
            exit 1
          fi
          echo "Release tag format is valid: ${{ github.event.inputs.release_tag }}"

      - name: Check if release tag already exists
        run: |
          set +e
          gh release view ${{ github.event.inputs.release_tag }} > /dev/null 2>&1
          EXIT_CODE=$?
          set -e
          if [[ $EXIT_CODE -eq 0 ]]; then
            echo "Error: Release tag ${{ github.event.inputs.release_tag }} already exists."
            exit 1
          else
            echo "Release tag ${{ github.event.inputs.release_tag }} does not exist. Proceeding..."
          fi
        # env:
        #   GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '22'

      # - name: Setup Gradle
      #   uses: gradle/gradle-build-action@v2

      # - name: Generate XCFramework
      #   run: ./gradlew podPublishXCFramework

      - name: Upload XCFramework as artifact
        uses: actions/upload-artifact@v6
        with:
          name: paywall-ios-xcframework
          path: paywall/library/build/cocoapods/publish/release/Paywall.xcframework
          if-no-files-found: error


  package:
    needs: build
    runs-on: ubuntu-latest
    steps:
      
      - uses: actions/checkout@v6

      - id: artifact-download
        name: Download xcframework artifact
        uses: actions/download-artifact@v6
        with:
          name: paywall-ios-xcframework
          path: ${{ env.ARTIFACTS_DIR }}/Paywall.xcframework
      
      - name: Zip XCFramework
        run: |
          # ls ${{ steps.artifact-download.outputs.download-path }}
          cd ${{ env.ARTIFACTS_DIR }} && zip -r Paywall.xcframework.zip Paywall.xcframework

      - name: Compute XCFramework checksum
        id: xc-framework-checksum
        run: checksum=$(swift package compute-checksum ${{ env.ARTIFACTS_DIR }}/Paywall.xcframework.zip); echo "checksum=$checksum" >> $GITHUB_OUTPUT

      - name: Print checksum
        run: |
          echo "XCFramework Checksum: ${{ steps.xc-framework-checksum.outputs.checksum }}"

      - name: Update Swift binary targets 
        run: |
          sed -i 's/\${RELEASE_TAG}/${{ github.event.inputs.release_tag }}/g' library/Package.swift
          sed -i 's/\${CHECKSUM}/${{ steps.xc-framework-checksum.outputs.checksum }}/g' library/Package.swift
          cat library/Package.swift >> ${{ env.ARTIFACTS_DIR }}/Package.swift

      - name: Test updated Package.swift
        run: |
          cat ${{ env.ARTIFACTS_DIR }}/Package.swift
          if grep -q '\${RELEASE_TAG}\|\${CHECKSUM}' ${{ env.ARTIFACTS_DIR }}/Package.swift; then
            echo "Error: Package.swift still contains placeholder values."
            exit 1
          fi
          if ! grep -q "${{ github.event.inputs.release_tag }}" ${{ env.ARTIFACTS_DIR }}/Package.swift; then
            echo "Error: Release tag was not updated in Package.swift."
            exit 1
          fi
          if ! grep -q "${{ steps.xc-framework-checksum.outputs.checksum }}" ${{ env.ARTIFACTS_DIR }}/Package.swift; then
            echo "Error: Checksum was not updated in Package.swift."
            exit 1
          fi

      - name: Upload XCFramework as artifact
        uses: actions/upload-artifact@v6
        with:
          name: paywall-ios-xcframework-zip
          path: ${{ env.ARTIFACTS_DIR }}/Paywall.xcframework.zip
          if-no-files-found: error

      - uses: actions/checkout@v6
        with:
          repository: Mather-Sophi/sophi-native-apps
          path: release-repo
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Commit updated Package.swift
        working-directory: release-repo
        run: |
          git checkout -b release/${{ github.event.inputs.release_tag }}
          cp ${{ env.ARTIFACTS_DIR }}/Package.swift ./Package.swift
          git add ./Package.swift
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git commit -m "Update Package.swift with new release tag ${{ github.event.inputs.release_tag }}"
          git push origin release/${{ github.event.inputs.release_tag }}

      - name: Test download
        run: ls -la ${{ env.ARTIFACTS_DIR }}/Paywall.xcframework.zip

      - name: Create GitHub release and attach xcframework
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.event.inputs.release_tag }} ${{ env.ARTIFACTS_DIR }}/Paywall.xcframework.zip --title "${{ github.event.inputs.release_tag }}" --notes "Release notes" --draft --prerelease
