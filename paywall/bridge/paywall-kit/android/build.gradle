buildscript {
  ext.getExtOrDefault = {name ->
    return rootProject.ext.has(name) ? rootProject.ext.get(name) : project.properties['PaywallKit_' + name]
  }

  repositories {
    google()
    mavenCentral()
  }

  dependencies {
    classpath "com.android.tools.build:gradle:${getExtOrDefault('androidGradlePluginVersion')}"
    // noinspection DifferentKotlinGradleVersion
    classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:${getExtOrDefault('kotlinVersion')}"
  }
}


apply plugin: "com.android.library"
apply plugin: "kotlin-android"
apply plugin: "com.facebook.react"

def getExtOrIntegerDefault(name) {
  return rootProject.ext.has(name) ? rootProject.ext.get(name) : (project.properties["PaywallKit_" + name]).toInteger()
}

android {
  namespace = "com.paywallkit"

  compileSdkVersion = getExtOrIntegerDefault("compileSdkVersion") as Integer

  defaultConfig {
    minSdkVersion getExtOrIntegerDefault("minSdkVersion") as Integer
    targetSdkVersion getExtOrIntegerDefault("targetSdkVersion") as Integer
  }

  buildFeatures {
    buildConfig true
  }

  buildTypes {
    release {
      minifyEnabled false
    }
  }

  lintOptions {
    disable "GradleCompatible"
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_20
    targetCompatibility JavaVersion.VERSION_20
  }

  sourceSets {
    main {
      java.srcDirs += [
        "generated/java",
        "generated/jni"
      ]
    }
  }
}

repositories {
  mavenCentral()
  google()
  maven {
    name = "GitHubPackages"
    url = uri("https://maven.pkg.github.com/Mather-Sophi/io-sophi-paywall-native")
    credentials {
      username = project.findProperty("gpr.user") as String?: System.getenv("GITHUB_ACTOR")
      password = project.findProperty("gpr.key") as String?: System.getenv("GITHUB_TOKEN")
    }
  }
  mavenLocal()
}

def kotlin_version = getExtOrDefault("kotlinVersion")

dependencies {
  implementation "com.facebook.react:react-android"
  implementation "org.jetbrains.kotlin:kotlin-stdlib:$kotlin_version"
  implementation("io.sophi.android:paywall-kit:0.0.4-alpha")
}


